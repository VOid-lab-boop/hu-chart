<!DOCTYPE html>
<html>
  <head>
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = window.location.origin + '/hu-chart/?redirect=' + 
        encodeURIComponent(path.replace('/hu-chart', '') + search + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
